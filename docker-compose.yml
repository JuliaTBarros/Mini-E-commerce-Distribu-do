services:
  gateway:
    build: ./gateway
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET}
      - USERS_URL=http://users:5001
      - PRODUCTS_URL=http://products-primary:5002
      - ORDERS_URL=http://orders:5003
    depends_on:
      - users
      - products-primary
      - products-replica
      - orders
    restart: unless-stopped

  users:
    build: ./users
    ports:
      - '5001:5001'
    environment:
      - PORT=5001
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - users-data:/app/data
    restart: unless-stopped

  products-primary:
    build: ./products
    ports:
      - '5002:5002'
    environment:
      - PORT=5002
      - JWT_SECRET=${JWT_SECRET}
      - IS_REPLICA=false
      - REPLICA_URL=http://products-replica:5012
    volumes:
      - products-primary-data:/app/data
    restart: unless-stopped

  products-replica:
    build: ./products
    ports:
      - '5012:5012'
    environment:
      - PORT=5012
      - JWT_SECRET=${JWT_SECRET}
      - IS_REPLICA=true
    volumes:
      - products-replica-data:/app/data
    restart: unless-stopped

  orders:
    build: ./orders
    ports:
      - '5003:5003'
    environment:
      - PORT=5003
      - JWT_SECRET=${JWT_SECRET}
      - USERS_URL=http://users:5001
      - PRODUCTS_URL=http://products-primary:5002
    volumes:
      - orders-data:/app/data
    depends_on:
      - users
      - products-primary
    restart: unless-stopped

  ui:
    build: ./ui
    ports:
      - '8080:80'
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  users-data:
  products-primary-data:
  products-replica-data:
  orders-data:
